<!DOCTYPE html>
<html>

<head>
  <base href="/trace_web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Capture the warmth of every falling moment.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="formify">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png">

  <title>Trace - Capture the moment</title>
  <link rel="manifest" href="manifest.json">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #111111;
      background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .stretch {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cover {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    /* ================= 新增：現代感載入條的 CSS 樣式 ================= */
    #custom-loader {
      position: absolute;
      top: 65%;
      /* 放在中央圖片的正下方 */
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      /* 載入條總寬度 */
      height: 3px;
      /* 載入條高度，設定細一點更有質感 */
      background-color: #2a2a2a;
      /* 軌道底色（深灰） */
      border-radius: 4px;
      overflow: hidden;
    }

    /* 製作光影掃描動畫 */
    #custom-loader::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      /* 光影的長度 */
      height: 100%;
      /* 使用漸層創造兩側淡化、中間明亮的質感 */
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
      border-radius: 4px;
      animation: shimmer 1.5s infinite ease-in-out;
    }

    @keyframes shimmer {
      0% {
        left: -40%;
      }

      100% {
        left: 100%;
      }
    }

    /* =============================================================== */
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      // 新增：確保 Flutter 載入完成後，將載入條一併撤掉
      document.getElementById("custom-loader")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>

<body>
  <picture id="splash">
    <source
      srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x"
      media="(prefers-color-scheme: light)">
    <source
      srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x"
      media="(prefers-color-scheme: dark)">
    <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>

  <div id="custom-loader"></div>

  <script src="flutter_bootstrap.js" async=""></script>

</body>

</html>
